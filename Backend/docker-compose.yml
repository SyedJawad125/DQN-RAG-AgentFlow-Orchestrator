services:
  web:
    build: .
#    command: python manage.py runserver 0.0.0.0:8000
    command: gunicorn --bind 0.0.0.0:8000 config.wsgi:application
    entrypoint: ["/entrypoint.sh"]
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db

  db:
    image: postgres:15
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  rabbitmq:
    image: rabbitmq:3-management
    ports:
      - "5672:5672"   # broker port
      - "15672:15672" # management UI
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest

  worker:
    build: .
    command: celery -A config worker -l info
    entrypoint: ["/entrypoint.sh"]
    volumes:
      - .:/app
    env_file:
      - .env
    depends_on:
      - rabbitmq

  adminer:
    image: adminer
    container_name: adminer_template
    restart: always
    ports:
      - "8080:8080"

  # ─── n8n Workflow Automation ───────────────────────────────────────────────
  n8n:
    image: n8nio/n8n
    restart: always
    ports:
      - "5678:5678"
    environment:
      # --- Database (uses your existing Postgres) ---
      - DB_TYPE=postgresdb
      - DB_POSTGRESDB_HOST=db
      - DB_POSTGRESDB_PORT=5432
      - DB_POSTGRESDB_DATABASE=${N8N_DB:-n8n_db}
      - DB_POSTGRESDB_USER=${POSTGRES_USER}
      - DB_POSTGRESDB_PASSWORD=${POSTGRES_PASSWORD}

      # --- Auth ---
      - N8N_BASIC_AUTH_ACTIVE=true
      - N8N_BASIC_AUTH_USER=${N8N_USER:-admin}
      - N8N_BASIC_AUTH_PASSWORD=${N8N_PASSWORD:-your_secure_password}

      # --- Host / URL ---
      - N8N_HOST=localhost
      - N8N_PORT=5678
      - WEBHOOK_URL=http://localhost:5678/

      # --- Timezone (optional but recommended) ---
      - GENERIC_TIMEZONE=Asia/Karachi
      - TZ=Asia/Karachi
    volumes:
      - n8n_data:/home/node/.n8n
    depends_on:
      - db
  # ──────────────────────────────────────────────────────────────────────────

volumes:
  postgres_data:
  n8n_data: